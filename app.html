<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Build a bilingual food allergy card for any country. Human-verified translations with hidden ingredient detection. Works offline." />
  <meta name="theme-color" content="#0F0F0F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AllergyPass — Professional Allergy Cards</title>
  <link rel="manifest" href="/manifest.json" />
  
  <style>
    :root {
      --red: #EF4444;
      --red-dark: #991B1B;
      --surface: #0F0F0F;
      --surface2: #1A1A1A;
      --surface3: #262626;
      --text: #F5F5F5;
      --text-dim: #A3A3A3;
      --accent: #FCA5A5;
      --border: #333333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--surface); color: var(--text); line-height: 1.5; overscroll-behavior: none; }

    /* ── TACTILE UI (NEUMORPHIC) ── */
    .picker-chip {
      background: var(--surface2);
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 4px 4px 10px #050505, -1px -1px 2px #2a2a2a;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-weight: 500;
    }

    .picker-chip.selected {
      box-shadow: inset 3px 3px 7px #050505, inset -1px -1px 2px #2a2a2a;
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent);
      transform: scale(0.97);
    }

    /* ── HIGH-CONTRAST CARD ── */
    #card-screen .allergy-card {
      background: #FFFFFF !important;
      color: #111111 !important;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .card-header-badge {
      background: #B91C1C;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 12px;
    }

    .clinical-seal {
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .seal-text {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #4B5563;
    }

    .btn-audio {
      background: #F3F4F6;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #111111;
      margin-top: 10px;
      cursor: pointer;
    }

    /* Existing structure placeholders */
    .container { padding: 20px; max-width: 600px; margin: 0 auto; }
    .screen { display: none; padding-bottom: 100px; }
    .screen.active { display: block; }
    .btn-main { background: var(--red); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 16px; margin-top: 20px; }
  </style>
</head>
<body>

  <div id="setup-screen" class="screen active">
    <div class="container">
      <h1 style="margin-bottom: 20px;">Build Your Card</h1>
      
      <p style="color: var(--text-dim); margin-bottom: 10px;">1. Select Destination</p>
      <div id="country-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px;"></div>

      <p style="color: var(--text-dim); margin-bottom: 10px;">2. Select Allergens</p>
      <div id="allergen-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>

      <button id="btn-generate" class="btn-main">Create Allergy Card</button>
    </div>
  </div>

  <div id="card-screen" class="screen">
    <div class="container">
      <div class="allergy-card" id="final-card">
        </div>
      <button class="btn-main" onclick="location.reload()" style="background: var(--surface2); margin-top: 40px;">Edit My Selection</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
