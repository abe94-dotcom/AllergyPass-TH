<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Build a bilingual Thai-English food allergy card for Thailand. Show restaurant staff exactly what you can't eat — works offline, no sign-up needed." />
  <meta name="theme-color" content="#CC0000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AllergyCard TH" />
  <meta property="og:title" content="AllergyCard TH — Food Allergy Card for Thailand" />
  <meta property="og:description" content="Build a bilingual Thai-English food allergy card in seconds. Show it to any Thai restaurant or street vendor. Free, offline-ready." />
  <meta property="og:type" content="website" />
  <title>AllergyCard TH — Build Your Card</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Singleton datalist — shared by all allergen entries via list="allergen-suggestions" -->
  <datalist id="allergen-suggestions">
    <option value="Shellfish">
    <option value="Nuts">
    <option value="Gluten">
    <option value="Peanuts">
    <option value="Dairy">
    <option value="Eggs">
    <option value="Soy">
    <option value="Wheat">
  </datalist>

  <!-- APP NAV -->
  <nav class="app-nav" id="app-nav">
    <div class="app-nav-inner">
      <a href="/" class="app-nav-logo">AllergyCard <span>TH</span></a>
      <a href="/thailand.html" class="app-nav-link">Thailand Guide</a>
    </div>
  </nav>

  <!-- SCREEN 1: Profile Builder -->
  <div id="screen-profile" class="screen active">
    <div class="profile-container">
      <div class="profile-header">
        <div class="profile-icon">🚫</div>
        <h1 class="profile-title">AllergyCard <span class="red">TH</span></h1>
        <p class="profile-subtitle">Build your Thailand food allergy card</p>
      </div>

      <div class="field-group">
        <label class="field-label">Your Name <span class="optional">(optional)</span></label>
        <input type="text" id="input-name" class="field-input" placeholder="e.g. Sarah" autocomplete="off" />
      </div>

      <div class="field-group">
        <label class="field-label">Emergency Contact <span class="optional">(optional)</span></label>
        <input type="tel" id="input-emergency" class="field-input" placeholder="e.g. +66 81 234 5678" autocomplete="off" />
      </div>

      <div class="allergens-section">
        <div class="allergens-header">
          <span class="allergens-label">Allergies</span>
          <button id="btn-add-allergy" class="btn-add">+ Add Allergy</button>
        </div>
        <div id="allergens-list" class="allergens-list"></div>
      </div>

      <button id="btn-generate" class="btn-generate" disabled>Generate My Card →</button>
      <button id="btn-show-last" class="btn-show-last" style="display:none">Show Last Card 👁</button>
    </div>
  </div>

  <!-- SCREEN 2: Allergy Card -->
  <div id="screen-card" class="screen">
    <div class="card-wrapper">
      <div class="card-nav">
        <button id="btn-back" class="btn-back">← Edit</button>
        <button id="btn-show-card" class="btn-show-card">Show Card 👁</button>
      </div>
      <div id="allergy-card" class="allergy-card">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Quick Show Overlay -->
  <div id="quick-overlay" class="quick-overlay"></div>

  <!-- Allergy Entry Template -->
  <template id="allergy-template">
    <div class="allergy-entry" data-id="">
      <div class="allergy-entry-header">
        <span class="allergy-entry-num"></span>
        <button class="btn-remove-allergy" title="Remove">✕</button>
      </div>
      <div class="allergy-fields">
        <div class="field-group">
          <label class="field-label">Allergen</label>
          <input type="text" class="field-input allergen-name" placeholder="e.g. Shellfish, Peanuts, Dairy" list="allergen-suggestions" autocomplete="off" />
        </div>
        <div class="field-group">
          <label class="field-label">Severity</label>
          <select class="field-input allergen-severity">
            <option value="Anaphylactic">Anaphylactic (most severe)</option>
            <option value="Severe">Severe</option>
            <option value="Intolerance">Intolerance</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Specific Triggers <span class="optional">(comma-separated)</span></label>
          <input type="text" class="field-input allergen-triggers" placeholder="e.g. shrimp, crab, fish sauce" autocomplete="off" />
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
