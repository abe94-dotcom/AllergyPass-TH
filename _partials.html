<!-- ================================================================
   _partials.html — REFERENCE ONLY, not a served page.

   Nav and footer are now injected via JS:
     /nav.js   → edit to change navigation links / mobile drawer
     /footer.js → edit to change footer columns and links

   To add a new page:
     1. Create the HTML file
     2. Add these two tags inside <body>:
          <script src="/nav.js"></script>    ← after <body>
          <script src="/footer.js"></script>  ← before </body>
     That's it. Nav and footer appear automatically.
   ================================================================ -->
